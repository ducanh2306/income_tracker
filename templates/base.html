<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SmartSpend Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">SmartSpend Tracker</a>
        <div>
            {% if user.is_authenticated %}
            <!--<a class="btn btn-light" href="/add-income/">Add Income</a>-->

            <form action="/accounts/logout/" method="post" style="display:inline;">
                {% csrf_token %}
                <button class="btn btn-danger">Logout</button>
            </form>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
            {% else %}

            <!--<a class="btn btn-success" href="accounts/login">Login</a>-->
            <a class="btn btn-light" href="/register/">Register</a>
            {% endif %}
        </div>
    </div>
</nav>
<div class="container mt-4">

    {% block content %}
    {% endblock %}
</div>
</body>
</html>
